<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" id="istanbulMap" class="istanbul-map">
  <defs>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <filter id="mapShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Water / Background -->
  <rect width="800" height="400" fill="url(#waterGrad)" rx="16"/>

  <!-- Bosphorus Strait -->
  <path d="M385,0 C395,80 375,160 390,240 C400,300 395,350 400,400"
        fill="none" stroke="#93C5FD" stroke-width="8" opacity="0.6"/>


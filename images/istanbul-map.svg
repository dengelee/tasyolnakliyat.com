  <!-- Animated Route Line -->
  <line id="routeLine" x1="0" y1="0" x2="0" y2="0"
        stroke="#2563EB" stroke-width="3" stroke-dasharray="8,4"
        stroke-linecap="round" opacity="0" class="route-line">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- Route Endpoints -->
  <circle id="routeStart" cx="0" cy="0" r="6" fill="#2563EB" opacity="0" class="route-point">
    <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle id="routeEnd" cx="0" cy="0" r="6" fill="#25D366" opacity="0" class="route-point">
    <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
